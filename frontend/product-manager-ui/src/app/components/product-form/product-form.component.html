<div class="container">
  <div class="form-card">
    <h1>{{ id ? '✏️ Editar Produto' : '➕ Novo Produto' }}</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      
      <div class="form-group">
        <label>Nome</label>
        <input type="text" formControlName="name" placeholder="Digite o nome do produto" />
      </div>

      <div class="form-group">
        <label>Preço</label>
        <input type="number" formControlName="price" placeholder="0.00" />
      </div>

      <div class="form-group">
        <label>Estoque</label>
        <input type="number" formControlName="stock" placeholder="0" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary">
          {{ id ? 'Atualizar' : 'Salvar' }}
        </button>

        <button type="button" class="btn cancel" routerLink="/">
          Cancelar
        </button>
      </div>

    </form>
  </div>
</div>
