version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: src/ProducManager.Api/Dockerfile
    ports:
      - "5000:80"
    container_name: product-api

  frontend:
    build:
      context: ./frontend/product-manager-ui
    ports:
      - "4200:80"
    container_name: product-frontend
    depends_on:
      - backend